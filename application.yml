# Tüm servislerin paylaştığı default config — Spring Cloud Config Server tüm
# <service>.yml'leri bunun üzerine merge eder.

spring:
  # Java 21+ virtual threads — tüm servisler aynı runtime stratejisini paylaşır
  threads:
    virtual:
      enabled: true

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Actuator base — health/info/prometheus her serviste lazım
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  metrics:
    enable:
      jvm: true
      process: true
      system: true

# Logging defaults — servisler bunun üzerine kendi level'ını koyabilir
logging:
  level:
    root: INFO
    com.sedcore: INFO
    org.hibernate.SQL: WARN

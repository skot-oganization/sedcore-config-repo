# pos-product-manager — PRODUCTION override

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false

  sql:
    init:
      mode: never

ocr:
  service:
    url: http://ocr-service:8003

reconcile:
  scheduled:
    enabled: true
    cron: "0 0 3 * * *"

overdue:
  notification:
    enabled: true
    cron: "0 0 9 * * MON-FRI"

notification:
  client:
    base-url: http://api-manager:8080

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

# notification servisi — PRODUCTION override

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=notification
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: false

  sql:
    init:
      mode: never

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:disabled}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}

mail:
  enabled: ${MAIL_ENABLED:false}
  from: ${MAIL_FROM:noreply@sedcore.com}

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL:disabled}

notification:
  delivery:
    mode: queue
  rabbitmq:
    dlq-ttl-ms: 86400000
  sms:
    provider: ${NOTIFICATION_SMS_PROVIDER:noop}
  whatsapp:
    provider: ${NOTIFICATION_WHATSAPP_PROVIDER:noop}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:disabled}
  auth-token: ${TWILIO_AUTH_TOKEN:disabled}
  from-phone: ${TWILIO_PHONE_NUMBER:disabled}
  whatsapp-from: ${TWILIO_WHATSAPP_NUMBER:disabled}

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.sedcore.notification: INFO

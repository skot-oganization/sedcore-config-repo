# hr-manager — DEV override
# Localhost Postgres (hrm schema), ddl-auto=update (kendi schema'sı → güvenli), DEBUG log.

spring:
  jpa:
    hibernate:
      # hrm izole schema; update = employees + hr_* tablolarını yaratır/günceller (veri kaybı yok).
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  # data.sql'i Postgres'te de çalıştır: Spring Boot default 'embedded' yalnız H2'de
  # çalıştırır → 'always' ile dev Postgres'e de seed (defer ile DDL sonrası). data.sql
  # ON CONFLICT DO NOTHING içerdiği için her boot idempotent.
  sql:
    init:
      mode: always

# Çalışan↔kullanıcı bağı doğrulaması — SecurityUserClient gateway üzerinden security'ye gider.
# DEV'de gateway localhost:8080 (prod default: http://api-manager:8080).
security:
  client:
    base-url: http://localhost:8080

logging:
  level:
    com.sedcore: DEBUG
    org.hibernate.SQL: DEBUG

# security servisi — base/env-agnostic config.
# K7 (2026-05-27): env-var pattern YOK. DB url + credentials -dev/-prod.yml'lerde.
# Dev override: security-dev.yml | Prod override: security-prod.yml

server:
  port: 8002
  servlet:
    context-path: /security

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    # url + username + password env-spesifik — dev/prod yml'lerinde

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: true
    # ddl-auto: dev=create, prod=validate (profile yml'lerde)
